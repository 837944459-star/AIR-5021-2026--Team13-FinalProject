# Tic-Tac-Toe 井字棋游戏配置文件
# 真实物理场景配置

# ========== 物理尺寸（单位：米）==========
# 棋盘：黑色水笔在硬纸板上绘制，总边长24cm×24cm，每格8cm×8cm
# 棋子：黄色和紫色泡沫塑料小方块，棱长约4cm
# 取棋区：棋盘右上角格子右边5cm处，黑色水笔绘制
physics:
  board:
    total_size: 0.24        # 棋盘总边长 24cm
    cell_size: 0.08         # 每格边长 8cm
    line_width: 0.005        # 画线宽度 5mm

  piece:
    size: 0.04               # 棋子棱长 4cm
    height: 0.04             # 棋子高度 4cm（正方体）

  storage_area:
    offset_x: 0.05          # 取棋区在棋盘右上角右边 5cm
    piece_count: 10          # 取棋区中初始棋子数量

# ========== 棋盘格子物理位置（相对于机械臂基座，单位：米）==========
# 需要根据实际标定结果修改！
# 棋盘坐标系：棋盘几何中心为原点，X轴指向右，Y轴指向上，Z轴垂直向上
# 标定方法：运行 calibrate_grid.py 手动标定每个格子的位置
grid_positions:
  (0, 0): {x: -0.08, y:  0.08, z: 0.05}   # 左上
  (0, 1): {x:  0.00, y:  0.08, z: 0.05}   # 上中
  (0, 2): {x:  0.08, y:  0.08, z: 0.05}   # 右上
  (1, 0): {x: -0.08, y:  0.00, z: 0.05}   # 左中
  (1, 1): {x:  0.00, y:  0.00, z: 0.05}   # 中心
  (1, 2): {x:  0.08, y:  0.00, z: 0.05}   # 右中
  (2, 0): {x: -0.08, y: -0.08, z: 0.05}   # 左下
  (2, 1): {x:  0.00, y: -0.08, z: 0.05}   # 下中
  (2, 2): {x:  0.08, y: -0.08, z: 0.05}   # 右下

# ========== 取棋区位置（机械臂从这里取棋子）==========
# 位于棋盘右上角格子(0,2)的右边5cm处
storage_position:
  x: 0.16          # 0.08(格子中心) + 0.05(偏移) + 0.02(棋子半径)
  y: 0.08          # 与棋盘右上角Y坐标相同
  z: 0.05          # 棋盘高度

# ========== 高度配置（单位：米）==========
height:
  hover: 0.08      # 悬停高度（高于棋子和取棋区）
  safe: 0.12       # 安全上升高度
  grasp: 0.02      # 抓取时的最小高度（棋子高度约4cm）

# ========== 运动配置 ==========
motion:
  velocity_scaling: 0.5
  acceleration_scaling: 0.5
  position_tolerance: 0.005
  orientation_tolerance: 0.01

# ========== 棋子颜色定义 ==========
piece_colors:
  human: "黄色"     # 人类使用黄色方块
  robot: "紫色"      # 机器人使用紫色方块

# ========== Qwen API配置 ==========
qwen:
  vision_model: "qwen-vl-max"
  llm_model: "qwen-plus"
  temperature: 0.7
  max_tokens: 200
